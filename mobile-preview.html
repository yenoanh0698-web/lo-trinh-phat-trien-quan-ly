<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Mobile Preview - VMP Academy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 30px;
            font-family: 'Inter', sans-serif;
        }
        .phone-frame {
            width: 390px;
            height: 844px;
            border: 3px solid #444;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 0 0 2px #222;
            position: relative;
            background: #000;
        }
        .phone-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 28px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }
        .phone-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
            opacity: 0.7;
        }
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .info {
            color: rgba(255,255,255,0.5);
            margin-top: 15px;
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>VMP Academy - Mobile Preview (iPhone 14)</h1>
        <div class="phone-frame">
            <iframe src="index.html"></iframe>
        </div>
        <p class="info">390 x 844px &bull; Scroll inside the frame to preview</p>
    </div>
</body>
</html>
